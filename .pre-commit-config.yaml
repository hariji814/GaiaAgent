# Local quality + encoding guard for GaiaAgent.
# Install: pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        exclude: ^(uv\.lock|.*\.(png|jpg|jpeg|gif|webp|svg|pdf))$
      - id: check-ast
      - id: check-docstring-first
      - id: check-case-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: ^tests/fixtures/.*$
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^tests/fixtures/.*$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # Encoding guard: reject non-UTF-8 bytes in source/docs (TODO P1 recurrence).
      - id: check-utf8
        name: Reject non-UTF-8 / CRLF in source & docs
        entry: python scripts/check_utf8.py
        language: python
        types: [text]
        pass_filenames: true
